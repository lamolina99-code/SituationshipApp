<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#a855f7" flood-opacity="0.6"/>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle glow bg -->
  <ellipse cx="512" cy="480" rx="320" ry="300" fill="url(#glow)"/>

  <!-- Orbit ring outer -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#2d1f4a" stroke-width="2" stroke-dasharray="12 8" opacity="0.6"/>

  <!-- Orbit ring inner -->
  <circle cx="512" cy="512" r="260" fill="none" stroke="#3d2d5a" stroke-width="1.5" stroke-dasharray="6 10" opacity="0.5"/>

  <!-- Small candidate dots on orbit -->
  <circle cx="852" cy="512" r="14" fill="#a855f7" opacity="0.9" filter="url(#softglow)"/>
  <circle cx="172" cy="512" r="10" fill="#60a5fa" opacity="0.7"/>
  <circle cx="672" cy="208" r="12" fill="#e879f9" opacity="0.8"/>
  <circle cx="352" cy="208" r="8" fill="#4ade80" opacity="0.6"/>
  <circle cx="742" cy="780" r="11" fill="#fbbf24" opacity="0.7"/>
  <circle cx="282" cy="780" r="9" fill="#34d399" opacity="0.6"/>

  <!-- Center heart -->
  <g transform="translate(512, 490)" filter="url(#shadow)">
    <path d="M0,-110 C-30,-170 -130,-170 -130,-70 C-130,20 0,100 0,100 C0,100 130,20 130,-70 C130,-170 30,-170 0,-110 Z"
      fill="url(#heartGlow)"/>
    <!-- Heart shine -->
    <path d="M-60,-120 C-80,-140 -100,-130 -95,-100" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.35"/>
  </g>

  <!-- Stars/sparkles -->
  <g opacity="0.7">
    <path d="M820,280 L826,296 L842,296 L829,306 L834,322 L820,312 L806,322 L811,306 L798,296 L814,296 Z" fill="#f0e6ff" opacity="0.5"/>
    <path d="M200,340 L204,352 L216,352 L207,360 L210,372 L200,364 L190,372 L193,360 L184,352 L196,352 Z" fill="#c084fc" opacity="0.4"/>
    <path d="M760,180 L762,188 L770,188 L764,193 L766,201 L760,196 L754,201 L756,193 L750,188 L758,188 Z" fill="#e879f9" opacity="0.6"/>
  </g>

  <!-- Bottom text -->
  <text x="512" y="820" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="700" letter-spacing="8" fill="#c084fc" opacity="0.9">THE ROTATION</text>
  <text x="512" y="868" text-anchor="middle" font-family="Georgia, serif" font-size="24" letter-spacing="12" fill="#7c6a9a" opacity="0.6">TRACKER</text>
</svg>
